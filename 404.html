<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Tony Howarth</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#05050b">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #05050b;
            --accent: #ff6b35;
            --accent-dim: rgba(255, 107, 53, 0.15);
            --border-glow: rgba(255, 107, 53, 0.25);
            --text-primary: #e4e4ec;
            --text-secondary: #8888a0;
            --font-display: 'Chakra Petch', sans-serif;
            --font-body: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin: 1rem 0 2.5rem;
        }

        .btn-home {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.9rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            color: var(--accent);
            border: 1px solid var(--border-glow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .btn-home:hover {
            background: var(--accent-dim);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.15);
        }
    </style>
</head>
<body>
    <main>
        <div class="code">404</div>
        <p class="message">This page wandered off the map. Nothing procedurally generated here.</p>
        <a href="/" class="btn-home">Back to Home</a>
    </main>
</body>
</html>
